services:
  transcoder:
    build:
      context: .
      args:
        RUNTIME: ${RUNTIME:-cuda}
    ports:
      - "${PORT:-7899}:7899"
    volumes:
      - ./data:/app/data
      # Mount your media folders here, e.g.:
      # - /mnt/media:/media
      - /home/raslan/Downloads/demo:/media
    user: "1000:1000"
    environment:
      - DATA_DIR=/app/data
      - HF_HOME=/app/data/hf-cache
    restart: unless-stopped

    # ── NVIDIA (requires nvidia-container-toolkit on the host) ───────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]

    # ── Intel / AMD via VA-API ───────────────────────────────────────────────
    # Comment out the nvidia section above and uncomment these:
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
